name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela execuções antigas do mesmo ref quando um novo push chega.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Rust — src-tauri)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Dependências de sistema do Tauri v2 (o crate liga webkit2gtk no build)
      # + cmake/clang para compilar aws-lc-sys (TLS do reqwest via rustls).
      - name: Instalar dependências do Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            cmake \
            clang \
            patchelf \
            file

      - name: Instalar toolchain Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache do cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Formatação (rustfmt)
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Lint (clippy, warnings = erro)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Testes (offline)
        working-directory: src-tauri
        run: cargo test

  frontend:
    name: Frontend (Vue — app)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Instalar dependências
        working-directory: app
        run: npm ci

      - name: Testes (Vitest)
        working-directory: app
        run: npm test

      - name: Checagem de tipos (vue-tsc)
        working-directory: app
        run: npx vue-tsc --noEmit
