name: Release

# Dispara ao publicar uma tag de versão (ex.: v0.1.0) ou manualmente.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # criar o Release e anexar os instaladores

jobs:
  release:
    name: Build & publish (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # Linux: dependências de sistema do Tauri v2 + cmake/clang (aws-lc/rustls).
      - name: Dependências do Tauri (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            cmake \
            clang \
            patchelf \
            file

      # Windows: NASM é exigido para compilar aws-lc-sys (TLS do reqwest via rustls).
      - name: Instalar NASM (Windows)
        if: matrix.platform == 'windows-latest'
        uses: ilammy/setup-nasm@v1

      - name: Instalar toolchain Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache do cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Instalar dependências do frontend
        working-directory: app
        run: npm ci

      - name: Build do app + publicar no Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'app-v__VERSION__' }}
          releaseName: "GeDoc IFES Toolkit v__VERSION__"
          releaseBody: |
            Instaladores do GeDoc IFES Toolkit (Tauri).

            - macOS: `.dmg` / `.app`
            - Linux: `.AppImage` / `.deb`
            - Windows: `.msi` / `.exe` (NSIS)

            Consulte o README para uso e a configuração opcional de IA (MISTRAL_KEY).
          releaseDraft: false
          prerelease: false
